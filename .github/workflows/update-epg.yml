name: Atualizar canais ao vivo, EPG e Filmes/Séries

# Mantém tudo em playlists/ sempre atualizado:
#   - canais_ao_vivo.m3u8        (playlist de TV ao vivo, já filtrada)
#   - canais_ao_vivo_epg.xml(.gz) (guia de programação/XMLTV dos canais ao vivo)
#   - filmes_series.m3u8          (playlist de Filmes e Séries / VOD)
#   - STATUS.txt                  (relatório da última execução)

on:
  schedule:
    # Roda a cada 6 horas (UTC). Ajuste conforme necessário.
    - cron: "15 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "scripts/**"
      - ".github/workflows/update-epg.yml"

permissions:
  contents: write

concurrency:
  group: update-playlists
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar tudo (canais ao vivo + EPG + filmes/séries)
        run: python3 scripts/update_all.py

      - name: Commit e push (se houver mudanças)
        run: |
          git config user.name "epg-bot"
          git config user.email "epg-bot@users.noreply.github.com"
          git add playlists/
          if git diff --cached --quiet; then
            echo "Nenhuma mudança."
          else
            git commit -m "Atualização automática - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
